name: grocery3
description: A new Flutter project.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  cached_network_image: ^3.3.1
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  data_connection_checker_tv: ^0.3.5-nullsafety
  dio: ^5.4.3+1
  dots_indicator: ^4.0.1
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.4
  fluttertoast: ^9.0.0
  get_it: ^9.2.1
  infinite_scroll_pagination: ^5.1.1
  intl: ^0.20.2
  introduction_screen: ^4.0.0
  modal_progress_hud_nsn: ^0.5.1
  shared_preferences: ^2.2.3
  shimmer: ^3.0.0
  skeletonizer: ^2.1.3
  flutter_stripe: ^12.6.0
  flutter_credit_card: ^4.1.0
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  auto_route_generator: ^10.5.0
  build_runner: ^2.13.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - assets/

# Splash config (لو هتستخدمه)
flutter_native_splash:
  color: "#ffffff"

# Auto generate assets class
flutter_assets:
  assets_path: assets/
  output_path: lib/core/constants/
  filename: app_assets.dart
