name: grocery3
description: A new Flutter project.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  cached_network_image: ^3.3.1
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  data_connection_checker_tv: ^0.3.5-nullsafety
  dio: ^5.4.3+1
  dots_indicator: ^4.0.1
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^9.0.0
  flutter_svg: ^2.2.4
  fluttertoast: ^8.2.5
  get_it: ^9.2.1
  infinite_scroll_pagination: ^4.0.0
  intl: ^0.19.0
  introduction_screen: ^4.0.0
  modal_progress_hud_nsn: ^0.5.1
  shared_preferences: ^2.2.3
  shimmer: ^3.0.0
  skeletonizer: ^2.1.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/

# Splash config (لو هتستخدمه)
flutter_native_splash:
  color: "#ffffff"

# Auto generate assets class
flutter_assets:
  assets_path: assets/
  output_path: lib/core/constants/
  filename: app_assets.dart
